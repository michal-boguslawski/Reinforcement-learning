env_kwargs:
  general_wrappers:
    atari_preprocessing:
      frame_skip: 1
      grayscale_obs: false
      screen_size: 84
      terminal_on_life_loss: true
    terminal_bonus:
      terminated_bonus: -5
  id: ALE/Pacman-v5
  normalize_rewards: false
  num_envs: 8
  training_wrappers:
    action_reward:
      abs_factors:
      - -0.5
      - 0
      - 0
      - 0
      - 0
    scale_reward:
      loc_factor: -0.02
      scale_factor: 0.5
  vectorization_mode: async
env_name: Pacman
experiment_name: PPO/v4
network:
  kwargs:
    backbone_kwargs:
      activation_fn: relu
      dims:
      - 64
      - 128
      - 256
      kernel_sizes:
      - 5
      - 5
      - 3
      out_features: 512
      strides:
      - 3
      - 2
      - 2
    backbone_name: cnn
    core_kwargs: {}
    core_name: identity
    distribution: categorical
    head_kwargs:
      activation_fn: relu
      hidden_dim: 512
    head_name: actor_critic
    initial_deviation: 0.6
    num_features: 64
policy:
  kwargs:
    advantage_normalize: batch
    clip_epsilon: 0.1
    entropy_kwargs:
      max_entropy: 0.01
      min_entropy: 1.0e-05
      scheduler_type: linear_entropy
      total_steps: 30000
    exploration_method:
      kwargs: {}
      name: distribution
    gamma: 0.99
    lambda_: 0.95
    num_epochs: 6
    optimizer_kwargs:
      actor_lr: 0.0003
      critic_lr: 0.0005
    scheduler_kwargs:
      T_max: 40000
      scheduler_type: cosine_annealing_lr
    use_value_clipping: absolute
    value_loss_coef: 0.5
  type: ppo
train_kwargs:
  batch_size: 512
  minibatch_size: 128
  num_steps: 10000000
worker_kwargs:
  device: auto
  record_step: 100000
  temperature_config: {}
  verbose: 1
