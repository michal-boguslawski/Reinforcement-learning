env_kwargs:
  general_wrappers:
    atari_preprocessing:
      frame_skip: 1
      grayscale_obs: false
      screen_size: 128
      terminal_on_life_loss: true
    terminal_bonus:
      terminated_bonus: -5
  id: ALE/Pacman-v5
  normalize_rewards: false
  num_envs: 8
  training_wrappers:
    scale_reward:
      loc_factor: 0.01
      scale_factor: 0.5
  vectorization_mode: async
env_name: Pacman
experiment_name: PPO/v1
network:
  kwargs:
    backbone_kwargs:
      activation_fn: relu
      dims:
      - 16
      - 32
      - 64
      kernel_sizes:
      - 5
      - 5
      - 3
      out_features: 128
      strides:
      - 2
      - 2
      - 2
    backbone_name: cnn
    core_kwargs: {}
    core_name: identity
    distribution: categorical
    head_kwargs:
      activation_fn: relu
      hidden_dim: 256
    head_name: actor_critic
    initial_deviation: 0.6
    num_features: 64
policy:
  kwargs:
    advantage_normalize: batch
    clip_epsilon: 0.2
    entropy_kwargs:
      max_entropy: 0.02
      min_entropy: 1.0e-05
      scheduler_type: linear_entropy
      total_steps: 400
    exploration_method:
      kwargs: {}
      name: distribution
    gamma: 0.99
    lambda_: 0.95
    num_epochs: 4
    optimizer_kwargs:
      actor_lr: 0.0003
      critic_lr: 0.0005
      log_std_lr: 5.0e-05
    scheduler_kwargs:
      T_max: 500
      scheduler_type: cosine_annealing_lr
    use_value_clipping: absolute
    value_loss_coef: 0.5
  type: ppo
train_kwargs:
  batch_size: 512
  minibatch_size: 128
  num_steps: 1000000
worker_kwargs:
  device: auto
  record_step: 100000
  temperature_config: {}
  verbose: 1
