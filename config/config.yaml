env_kwargs:
  general_wrappers:
    # resize_observation:
    #   shape: 128
    rescale_observation:
      min_obs: -1.
      max_obs: 1.
  id: ALE/Pacman-v5
  normalize_rewards: false
  num_envs: 4
  permute_observations: true
  vectorization_mode: async
env_name: Pacman
experiment_name: PPO/v1
network:
  kwargs:
    backbone_kwargs:
      activation_fn: relu
      dims:
      - 16
      - 32
      - 64
      kernel_sizes:
      - 5
      - 5
      - 3
      out_features: 128
      strides:
      - 2
      - 2
      - 2
    backbone_name: cnn
    distribution: categorical
    head_kwargs:
      hidden_dim: 256
      activation_fn: relu
    head_name: actor_critic
    initial_deviation: 0.6
policy:
  kwargs:
    advantage_normalize: batch
    clip_epsilon: 0.2
    entropy_kwargs:
      max_entropy: 0.02
      min_entropy: 0.00001
      scheduler_type: linear_entropy
      total_steps: 400
    exploration_method:
      kwargs: {}
      name: distribution
    gamma: 0.99
    lambda_: 0.95
    num_epochs: 6
    optimizer_kwargs:
      actor_lr: 3e-4
      core_lr: 5e-5
      critic_lr: 5e-4
      log_std_lr: 5e-5
    scheduler_kwargs:
      T_max: 500
      scheduler_type: cosine_annealing_lr
    use_value_clipping: absolute
    value_loss_coef: 0.5
  type: ppo
train_kwargs:
  batch_size: 1024
  minibatch_size: 128
  num_steps: 1000000
worker_kwargs:
  device: auto
  record_step: 100000
  temperature_config: {}
  verbose: 1
